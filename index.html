<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ingredient_check</title>
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
   <script src="app.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family: Arial, sans-serif;
        }
        .app-name-top{
    position:absolute;
    top:30px;
    font-family:'New Rocker', cursive;
    color:white;
    font-size:40px;
    letter-spacing:3px;
}
        .container{
            text-align:center;
            padding:40px;
            border:1px solid #333;
            border-radius:15px;
            background:#111;
            box-shadow:0 0 20px rgba(255,255,255,0.1);
        }

        h1{
            font-family:'New Rocker', cursive;
            color:white;
            font-size:48px;
            margin-bottom:25px;
            letter-spacing:2px;
        }

        .scan-btn{
            background:#fff;
            color:#000;
            border:none;
            padding:15px 35px;
            font-size:18px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        .scan-btn:hover{
            background:#dcdcdc;
            transform:scale(1.05);
        }
        #resultBox {
    color: white;
    margin-top: 25px;
    font-size: 16px;
    line-height: 1.5;
    max-width: 600px;
    text-align: left;
    background: #1a1a1a;
    padding: 15px;
    border-radius: 8px;
}
    </style>
</head>
<body>
   <h2 class="app-name-top">Ingredient_Check</h2>
   <div class="floating-images">
  <!--  <img src="img1.png" class="disease disease1">
    <img src="img2.png" class="disease disease2">
    <img src="img3.png" class="disease disease3">
    <img src="img4.png" class="disease disease4">
    <img src="img4.png" class="disease disease4">-->
</div>
    <div class="container">
        <h1>Scan Me</h1>
        <input type="file" id="imageInput" accept="image/*" hidden>
    <button class="scan-btn" id="scanBtn">Scan the Product</button>
    <div id="resultBox"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="javascript.js"></script>
</body>
</html>
