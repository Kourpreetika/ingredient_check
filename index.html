<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ingredient_check</title>
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes glowRed {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 80, 80, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 80, 80, 0.8); }
        }

        @keyframes glowGreen {
            0%, 100% { box-shadow: 0 0 10px rgba(80, 255, 120, 0.2); }
            50% { box-shadow: 0 0 20px rgba(80, 255, 120, 0.6); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(77, 255, 136, 0.35))
                        drop-shadow(0 2px 16px rgba(0, 0, 0, 0.9));
            }
            50% {
                filter: drop-shadow(0 0 22px rgba(77, 255, 136, 0.65))
                        drop-shadow(0 2px 20px rgba(0, 0, 0, 0.9));
            }
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes lineExpand {
            from { transform: scaleX(0); opacity: 0; }
            to { transform: scaleX(1); opacity: 1; }
        }

        @keyframes taglineFade {
            from { opacity: 0; letter-spacing: 6px; }
            to { opacity: 1; letter-spacing: 4px; }
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 22px 24px 18px;
            text-align: center;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.75) 0%,
                rgba(0, 0, 0, 0.35) 70%,
                transparent 100%
            );
            animation: fadeInDown 0.9s ease-out both;
            pointer-events: none;
        }

        .app-logo {
            display: inline-block;
        }

        .app-name {
            font-family: 'New Rocker', cursive;
            font-size: clamp(28px, 5vw, 46px);
            font-weight: 400;
            line-height: 1.1;
            margin: 0;
            animation: titleGlow 3s ease-in-out infinite;
        }

        .logo-word {
            background: linear-gradient(
                120deg,
                #ffffff 0%,
                #e8ffe8 35%,
                #ffffff 50%,
                #b8ffd0 65%,
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        .logo-underscore {
            color: #4dff88;
            -webkit-text-fill-color: #4dff88;
            text-shadow: 0 0 12px rgba(77, 255, 136, 0.8);
            margin: 0 2px;
        }

        .logo-check {
            background: linear-gradient(120deg, #4dff88, #a8ffcb, #4dff88);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        .app-tagline {
            margin: 8px 0 0;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.55);
            animation: taglineFade 1.2s ease-out 0.4s both;
        }

        .logo-underline {
            height: 2px;
            width: 100%;
            max-width: 220px;
            margin: 12px auto 0;
            border-radius: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                #4dff88 20%,
                #ffffff 50%,
                #4dff88 80%,
                transparent
            );
            transform-origin: center;
            animation: lineExpand 0.8s ease-out 0.5s both;
            box-shadow: 0 0 12px rgba(77, 255, 136, 0.5);
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            margin-top: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            background: rgba(17, 17, 17, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.9s ease-out 0.2s both;
            max-width: 90vw;
        }

        h1 {
            font-family: 'New Rocker', cursive;
            font-weight: 400;
            line-height: 1.1;
            margin: 0 0 8px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        .section-title {
            font-size: clamp(36px, 7vw, 52px);
        }

        .section-title-sm {
            font-size: clamp(26px, 5vw, 38px);
        }

        .section-underline {
            height: 2px;
            width: 100%;
            max-width: 160px;
            margin: 0 auto 25px;
            border-radius: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                #4dff88 20%,
                #ffffff 50%,
                #4dff88 80%,
                transparent
            );
            box-shadow: 0 0 12px rgba(77, 255, 136, 0.5);
        }

        .scan-btn {
            background: #4dff88;
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .scan-btn:hover {
            background: #3de077;
            transform: scale(1.06);
            box-shadow: 0 0 18px rgba(77, 255, 136, 0.5);
        }

        .scan-btn:active {
            transform: scale(0.97);
        }

        .scan-btn.scanning {
            animation: pulse 1.2s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.85;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 0.8s linear infinite;
        }

        .hidden {
            display: none;
        }

        #resultBox {
            color: white;
            margin-top: 25px;
            font-size: 16px;
            line-height: 1.5;
            max-width: 600px;
            text-align: left;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
        }

        #resultBox.result-show {
            opacity: 1;
            transform: translateY(0);
        }

        #resultBox.result-danger {
            border: 1px solid #ff4d4d;
            animation: glowRed 2s ease-in-out infinite;
        }

        #resultBox.result-safe {
            border: 1px solid #4dff88;
            animation: glowGreen 2s ease-in-out infinite;
        }

        #resultBox.result-error {
            border: 1px solid #ffaa44;
            box-shadow: 0 0 15px rgba(255, 170, 68, 0.4);
        }

        .ingredient-item {
            opacity: 0;
            transform: translateX(-10px);
            animation: fadeInUp 0.5s ease forwards;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

        .ingredient-item:last-of-type {
            border-bottom: none;
        }

        .ingredient-item h4 {
            color: #ff6b6b;
            text-transform: capitalize;
            margin-bottom: 4px;
        }

        #resultBox h3 {
            margin-bottom: 12px;
            font-family: 'New Rocker', cursive;
            letter-spacing: 1px;
        }

        .scan-status {
            color: #aaa;
            margin-top: 15px;
            font-style: italic;
        }

        .question-text {
            color: #ddd;
            font-size: 18px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .choice-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-btn {
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .choice-yes {
            background: #4dff88;
            color: #000;
        }

        .choice-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(77, 255, 136, 0.4);
        }

        .choice-no {
            background: #ff6b6b;
            color: #fff;
        }

        .choice-no:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(255, 107, 107, 0.4);
        }

        .not-food-msg {
            color: #ccc;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.25s ease;
            margin-top: 16px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="video-bg" aria-hidden="true">
        <video autoplay muted loop playsinline>
            <source src="ingredient_check.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header class="app-header">
        <div class="app-logo">
            <h1 class="app-name">
                <span class="logo-word">Ingredient</span><span class="logo-underscore">_</span><span class="logo-check">Check</span>
            </h1>
            <p class="app-tagline">Scan · Analyze</p>
            <div class="logo-underline" aria-hidden="true"></div>
        </div>
    </header>

    <div class="container">
        <div id="foodQuestionStep">
            <h1 class="section-title">
                <span class="logo-word">Welcome</span>
            </h1>
            <div class="section-underline" aria-hidden="true"></div>
            <p class="question-text">Is this product an eating product (food item)?</p>
            <div class="choice-btns">
                <button type="button" class="choice-btn choice-yes" id="yesFoodBtn">Yes, it's food</button>
                <button type="button" class="choice-btn choice-no" id="noFoodBtn">No, it's not food</button>
            </div>
        </div>

        <div id="scanStep" class="hidden">
            <h1 class="section-title">
                <span class="logo-word">Scan</span><span class="logo-underscore">_</span><span class="logo-check">Me</span>
            </h1>
            <div class="section-underline" aria-hidden="true"></div>
            <input type="file" id="imageInput" accept="image/*" hidden>
            <button type="button" class="scan-btn" id="scanBtn">Scan the Product</button>
            <button type="button" class="back-btn" id="backFromScanBtn">← Change answer</button>
            <div id="loader" class="loader hidden"></div>
            <div id="resultBox"></div>
        </div>

        <div id="notFoodStep" class="hidden">
            <h1 class="section-title section-title-sm">
                <span class="logo-word">Not a food</span><span class="logo-underscore">_</span><span class="logo-check">product</span>
            </h1>
            <div class="section-underline" aria-hidden="true"></div>
            <p class="not-food-msg">
                This app only scans ingredient labels on eating products (food &amp; drinks).
                Please use a food item to continue.
            </p>
            <button type="button" class="back-btn" id="backFromNotFoodBtn">← Go back</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="javascript.js"></script>
</body>
</html>
